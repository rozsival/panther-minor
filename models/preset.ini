version = 1

[*]
flash-attn = on
n-gpu-layers = 123
numa = distribute
split-mode = layer

[panther-minor]
model = /models/.huggingface/panther-minor.gguf
ctx-size = 131072
n-predict = 16384

[panther-coder]
model = /models/.huggingface/panther-coder.gguf
ctx-size = 131072
n-predict = 16384
temp = 0.0
top-p = 0.9
repeat-penalty = 1.1

[panther-coder-small]
model = /models/.huggingface/panther-coder.gguf
ctx-size = 65536
n-predict = 8192
temp = 0.0
top-p = 0.9
repeat-penalty = 1.1

[panther-coder-large]
model = /models/.huggingface/panther-coder.gguf
ctx-size = 262144
n-predict = 32768
temp = 0.0
top-p = 0.9
repeat-penalty = 1.1

