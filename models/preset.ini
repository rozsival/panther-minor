version = 1

[*]
fit = on
flash-attn = on
n-gpu-layers = 123
numa = distribute
split-mode = layer

[panther-minor]
model = /models/.huggingface/panther-minor.gguf
ctx-size = 131072
n-predict = 16384

cache-type-k = q8_0
cache-type-v = q8_0
top-k = 20
min-p = 0

[panther-minor-small]
model = /models/.huggingface/panther-minor.gguf
ctx-size = 65536
n-predict = 8192

cache-type-k = q8_0
cache-type-v = q8_0
min-p = 0
top-k = 20

[panther-minor-large]
model = /models/.huggingface/panther-minor.gguf
ctx-size = 262144
n-predict = 32768

cache-type-k = q8_0
cache-type-v = q8_0
min-p = 0
top-k = 20

[panther-coder]
model = /models/.huggingface/panther-coder.gguf
ctx-size = 131072
n-predict = 16384

cache-type-k = q8_0
cache-type-v = q8_0
min-p = 0
repeat-penalty = 1.1
temp = 0.0
top-k = 20
top-p = 0.95

[panther-coder-small]
model = /models/.huggingface/panther-coder.gguf
ctx-size = 65536
n-predict = 8192

cache-type-k = q8_0
cache-type-v = q8_0
min-p = 0
repeat-penalty = 1.1
temp = 0.0
top-k = 20
top-p = 0.95

[panther-coder-large]
model = /models/.huggingface/panther-coder.gguf
ctx-size = 262144
n-predict = 32768

cache-type-k = q8_0
cache-type-v = q8_0
min-p = 0
repeat-penalty = 1.1
temp = 0.0
top-k = 20
top-p = 0.95

