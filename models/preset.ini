version = 1

[*]
cache-type-k = q8_0
cache-type-v = q8_0
ctx-size = 131072
flash-attn = on
n-gpu-layers = auto
numa = distribute
split-mode = layer

[panther-minor]
model = /models/.huggingface/panther-minor/Qwen3.5-35B-A3B-Q8_0.gguf
mmproj = /models/.huggingface/panther-minor/mmproj-F16.gguf
# https://unsloth.ai/docs/models/qwen3.5#qwen3.5-35b-a3b
chat-template-kwargs = {"enable_thinking":false}
min-p = 0.0
n-predict = 6144
temp = 0.7
top-k = 0.0
top-p = 0.8

[panther-minor-thinking]
model = /models/.huggingface/panther-minor/Qwen3.5-35B-A3B-Q8_0.gguf
mmproj = /models/.huggingface/panther-minor/mmproj-F16.gguf
# https://unsloth.ai/docs/models/qwen3.5#qwen3.5-35b-a3b
chat-template-kwargs = {"enable_thinking":true}
n-predict = 6144
temp = 1.0
top-k = 20
top-p = 0.95

[panther-coder]
model = /models/.huggingface/panther-coder/Qwen3-Coder-30B-A3B-Instruct-Q8_0.gguf
# https://unsloth.ai/docs/models/tutorials/qwen3-coder-how-to-run-locally#running-qwen3-coder
min-p = 0.0
n-predict = 6144
repeat-penalty = 1.05
temp = 0.7
top-k = 20
top-p = 0.8

[panther-coder-next]
model = /models/.huggingface/panther-coder-next/Qwen3-Coder-Next-Q4_0.gguf
# https://unsloth.ai/docs/models/qwen3-coder-next#usage-guide
min-p = 0.01
n-predict = 8192
repeat-penalty = 1.0
temp = 1.0
top-k = 40
top-p = 0.95

[panther-coder-large]
model = /models/.huggingface/panther-coder-large/Qwen3-Coder-Next-Q8_0-00001-of-00003.gguf
# https://unsloth.ai/docs/models/qwen3-coder-next#usage-guide
min-p = 0.01
n-predict = 8192
repeat-penalty = 1.0
temp = 1.0
top-k = 40
top-p = 0.95

[panther-blazer]
model = /models/.huggingface/panther-blazer/Qwen3.5-2B-Q8_0.gguf
mmproj = /models/.huggingface/panther-blazer/mmproj-F16.gguf
# https://unsloth.ai/docs/models/qwen3.5#qwen3.5-small-0.8b-2b-4b-9b
chat-template-kwargs = {"enable_thinking":false}
min-p = 0.00
n-predict = 4096
split-mode = none
temp = 0.7
top-k = 20
top-p = 0.8

[panther-blazer-thinking]
model = /models/.huggingface/panther-blazer/Qwen3.5-2B-Q8_0.gguf
mmproj = /models/.huggingface/panther-blazer/mmproj-F16.gguf
# https://unsloth.ai/docs/models/qwen3.5#qwen3.5-small-0.8b-2b-4b-9b
chat-template-kwargs = {"enable_thinking":true}
ctx-size = 131072
min-p = 0.00
n-predict = 4096
split-mode = none
temp = 0.6
top-k = 20
top-p = 0.95
