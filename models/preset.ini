version = 1

[*]
flash-attn = on
n-gpu-layers = 99
numa = distribute
split-mode = layer

[panther-minor]
model = /models/.huggingface/panther-minor.gguf
ctx-size = 65536

min-p = 0.01
temp = 0.6
top-p = 0.9

[panther-coder]
model = /models/.huggingface/panther-coder.gguf
ctx-size = 131072

min-p = 0
repeat-penalty = 1.05
temp = 0.7
top-k = 20
top-p = 0.8

[panther-coder-small]
model = /models/.huggingface/panther-coder.gguf
ctx-size = 65536

min-p = 0
repeat-penalty = 1.05
temp = 0.7
top-k = 20
top-p = 0.8

[panther-coder-large]
model = /models/.huggingface/panther-coder.gguf
ctx-size = 262144

min-p = 0
repeat-penalty = 1.05
temp = 0.7
top-k = 20
top-p = 0.8

