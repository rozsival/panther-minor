commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}

pre-commit:
  parallel: true
  jobs:
    - run: cd bin && bashly generate && bashly add completions --force
      stage_fixed: true

    - run: pnpm ultracite fix
      glob:
        - "**/*.js"
        - "**/*.md"
        - "**/*.json"
        - "**/*.jsonc"
      stage_fixed: true
