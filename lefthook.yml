commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}

pre-commit:
  parallel: true
  jobs:
    - run: pnpm run build:cli
      glob:
        - "bin/bashly.yml"
        - "bin/src/**/*.sh"
      stage_fixed: true

    - run: pnpm ultracite fix
      glob:
        - "**/*.js"
        - "**/*.md"
        - "**/*.json"
        - "**/*.jsonc"
      stage_fixed: true
