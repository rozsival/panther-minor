commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}

pre-commit:
  parallel: true
  jobs:
    - run: pnpm run build:cli
      glob:
        - "bin/src/bashly.yml"
        - "bin/src/**/*.sh"
      stage_fixed: true

    - run: pnpm ultracite fix
      glob:
        - "**/*.js"
        - "**/*.md"
        - "**/*.json"
        - "**/*.jsonc"
      stage_fixed: true

    - run: pnpm prettier --write {staged_files}
      glob:
        - "**/*.md"
        - "**/*.toml"
        - "**/*.yaml"
        - "**/*.yml"
        - "package.json"
        - "panther-minor.code-workspace"
      stage_fixed: true
