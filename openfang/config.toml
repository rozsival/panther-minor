# https://www.openfang.sh/docs/configuration
api_listen = "0.0.0.0:4200"

[default_model]
api_key_env = ""
model = "panther-minor"
provider = "panther-minor"

[memory]
decay_rate = 0.05
embedding_provider = "panther-minor"
embedding_model = "panther-embedding"

[provider_urls]
panther-minor = "http://llama-metrics-exporter:8001/v1"
