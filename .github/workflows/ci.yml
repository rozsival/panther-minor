name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up project
        uses: ./.github/actions/setup

      - name: Quality Assurance
        # language=bash
        run: |
          pnpm exec commitlint --from=${{ github.sha }}
          pnpm exec biome ci .
          pnpm exec prettier --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up project
        uses: ./.github/actions/setup

      - name: Run tests
        run: pnpm run test
