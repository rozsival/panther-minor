name: Setup
description: Setup monorepo for CI

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup node.js
      uses: actions/setup-node@v6
      with:
        cache: pnpm
        node-version-file: package.json

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --prefer-offline
      shell: bash
