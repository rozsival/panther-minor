name: panther-minor

# -- Shared network -----------------------------------------------------------
networks:
  ai:
    driver: bridge

# -- Persistent volumes -------------------------------------------------------
volumes:
  prometheus-data:
  grafana-data:
  ollama-data:
  open-webui-data:

services:
  # -- Ollama (llama.cpp wrapper) ---------------------------------------------
  # OpenAI-compatible LLM inference, native RDNA 4 and ROCm 7 support
  ollama:
    # https://github.com/ollama/ollama/pull/13000
    image: ghcr.io/rjmalagon/ollama-linux-amd-apu:v0.16.2
    privileged: true
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/renderD129:/dev/dri/renderD129
    group_add:
      - video
      - render
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${ROCM_GFX_VERSION:-12.0.1}
      - OLLAMA_FLASH_ATTENTION=true
      - OLLAMA_HOST=0.0.0.0:8000
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_LLM_LIBRARY=rocm_${ROCM_VERSION:-v7}
      - OLLAMA_NUM_CTX=${MODEL_CONTEXT_SIZE:-262144}
      - ROCR_VISIBLE_DEVICES=${ROCM_VISIBLE_DEVICES:-0,1}
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-8000}:8000"
    networks:
      - ai
    healthcheck:
      test: [ "CMD-SHELL", "ollama --version || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -- Ollama Model Puller ----------------------------------------------------
  # Automatically pulls the requested model on startup if it doesn't exist
  ollama-puller:
    image: curlimages/curl:8.18.0
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ai
    environment:
      - MODEL=${MODEL:-qwen3-coder:30b-a3b-q8_0}
    command: >
      sh -c '
        echo "Checking if model $$MODEL is already available..."
        if curl -s http://ollama:8000/api/tags | grep -q "\"name\":\"$$MODEL\""; then
          echo "Model $$MODEL already exists, skipping pull."
          exit 0
        fi

        echo "Pulling model $$MODEL (this may take several minutes)..."
        curl -X POST http://ollama:8000/api/pull -d "{\"name\": \"$$MODEL\"}" --no-buffer 2>&1 | while IFS= read -r line; do
          echo "$$line"
          if echo "$$line" | grep -q "\"status\":\"success\""; then
            echo "Model pull completed successfully."
            exit 0
          fi
        done

        echo "Verifying model availability..."
        if curl -s http://ollama:8000/api/tags | grep -q "\"name\":\"$$MODEL\""; then
          echo "Model $$MODEL is now available."
          exit 0
        else
          echo "ERROR: Model pull may have failed."
          exit 1
        fi
      '

  # -- AMD GPU metrics exporter -----------------------------------------------
  amd-gpu-exporter:
    image: rocm/device-metrics-exporter:v1.5.0-beta.0
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/renderD129:/dev/dri/renderD129
    group_add:
      - video
      - render
    ports:
      - "${GPU_EXPORTER_PORT:-5000}:5000"
    networks:
      - ai

  # -- Host metrics (CPU, RAM, disk, network) ---------------------------------
  node-exporter:
    image: prom/node-exporter:v1.10.2
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    expose:
      - 9100
    networks:
      - ai

  # -- Prometheus -------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.10.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - ai
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O- http://localhost:9090/-/healthy >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      - node-exporter
      - amd-gpu-exporter

  # -- Open WebUI (chat interface) --------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    restart: unless-stopped
    environment:
      # Point directly at the local Ollama API
      OPENAI_API_BASE_URL: http://ollama:8000/v1
      OPENAI_API_KEY: "ollama"
      # Disable login — this is a private local server
      WEBUI_AUTH: "false"
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      - "${OPEN_WEBUI_PORT:-8080}:8080"
    networks:
      - ai
    depends_on:
      - ollama

  # -- Grafana ----------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:12.4.1
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - ai
    depends_on:
      prometheus:
        condition: service_healthy
