name: panther-minor

# -- Shared network -----------------------------------------------------------
networks:
  ai:
    driver: bridge

# -- Persistent volumes -------------------------------------------------------
volumes:
  llama-cpp-data:
  open-webui-data:
  prometheus-data:
  grafana-data:

services:
  # -- llama.cpp ---------------------------------------------
  # OpenAI-compatible LLM inference, native RDNA 4 and ROCm 7 support
  llama-cpp:
    build:
      context: ./llama-cpp
    privileged: true
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-992}"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HIP_VISIBLE_DEVICES=${ROCM_VISIBLE_DEVICES:-0,1}
    volumes:
      - llama-cpp-data:/root/.cache
      - ./models:/models:ro
    ports:
      - "8000:8000"
    networks:
      - ai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -- Open WebUI (chat interface) --------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    restart: unless-stopped
    environment:
      OPENAI_API_BASE_URL: http://llama-cpp:8000/v1
      OPENAI_API_KEY: "llama-cpp"
      WEBUI_AUTH: "false"
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      - "8080:8080"
    networks:
      - ai
    depends_on:
      - llama-cpp

  # -- AMD GPU metrics exporter -----------------------------------------------
  amd-gpu-exporter:
    image: rocm/device-metrics-exporter:v1.5.0-beta.0
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/renderD129:/dev/dri/renderD129
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-992}"
    expose:
      - 5000
    networks:
      - ai

  # -- Host metrics (CPU, RAM, disk, network) ---------------------------------
  node-exporter:
    image: prom/node-exporter:v1.10.2
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    expose:
      - 9100
    networks:
      - ai

  # -- Prometheus -------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.10.0
    restart: unless-stopped
    volumes:
      - prometheus-data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - ai
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://localhost:9090/-/healthy >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      - node-exporter
      - amd-gpu-exporter

  # -- Grafana ----------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:12.4.1
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - ai
    depends_on:
      prometheus:
        condition: service_healthy
