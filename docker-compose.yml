name: panther-minor

# -- Shared network -----------------------------------------------------------
networks:
  ai:
    driver: bridge

# -- Persistent volumes -------------------------------------------------------
volumes:
  llama-cpp-comgr:
  open-webui-data:
  openfang-data:
  openfang-workspaces:
  prometheus-data:
  grafana-data:
  proxy-logs:

services:
  # -- llama.cpp --------------------------------------------------------------
  # OpenAI-compatible LLM inference, native RDNA 4 and ROCm 7 support
  llama-cpp:
    container_name: llama-cpp
    build:
      context: ./llama-cpp
      args:
        HOST_UID: ${HOST_UID}
        HOST_GID: ${HOST_GID}
        LLAMA_CPP_REPO: ${LLAMA_CPP_REPO}
        LLAMA_CPP_REF: ${LLAMA_CPP_REF}
        LLAMA_CPP_USER: 'llama-cpp'
        ROCM_ARCH: ${ROCM_ARCH}
    privileged: true
    restart: unless-stopped
    devices:
      - '/dev/kfd:/dev/kfd'
      - '/dev/dri:/dev/dri'
    group_add:
      - ${VIDEO_GID}
      - ${RENDER_GID}
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HIP_VISIBLE_DEVICES: ${ROCM_VISIBLE_DEVICES}
      LLAMA_CPP_BATCH_SIZE: ${LLAMA_CPP_BATCH_SIZE}
      LLAMA_CPP_MODELS_MAX: ${LLAMA_CPP_MODELS_MAX}
      LLAMA_CPP_SLEEP_IDLE_SECONDS: ${LLAMA_CPP_SLEEP_IDLE_SECONDS}
      LLAMA_CPP_UBATCH_SIZE: ${LLAMA_CPP_UBATCH_SIZE}
    tmpfs:
      - '/home/llama-cpp/.cache/slots:size=${LLAMA_CPP_SLOTS_SIZE},mode=1777'
    volumes:
      - 'llama-cpp-comgr:/home/llama-cpp/.cache/comgr'
      - './models/.huggingface:/home/llama-cpp/.cache/huggingface/hub'
      - './models/preset.ini:/home/llama-cpp/.cache/huggingface/preset.ini:ro'
    ulimits:
      memlock: -1
    expose:
      - 8000
    networks:
      - ai
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -- llama.cpp manager (proxy + idle unload) ----------------------------------
  # Activity-aware reverse proxy: records inference activity and unloads models
  # through llama-server when the cluster stays idle.
  llama-manager:
    container_name: llama-manager
    image: node:24-trixie-slim
    restart: unless-stopped
    command: ['node', '/app/main.js']
    environment:
      IDLE_UNLOAD_RETRY_SECONDS: 15
      LLAMA_CPP_SLEEP_IDLE_SECONDS: '${LLAMA_CPP_SLEEP_IDLE_SECONDS}'
      LLAMA_SERVER_URL: 'http://llama-cpp:8000'
      LOG_LEVEL: info
      PORT: 8000
      UPSTREAM_TIMEOUT_SECONDS: 4
    volumes:
      - './llama-cpp/manager.js:/app/main.js:ro'
      - './llama-cpp/models.js:/app/models.js:ro'
    expose:
      - 8000
    networks:
      - ai
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:8000/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -- llama.cpp metrics exporter ---------------------------------------------
  llama-metrics-exporter:
    container_name: llama-metrics-exporter
    image: node:24-trixie-slim
    restart: unless-stopped
    command: ['node', '/app/main.js']
    environment:
      CACHE_TTL_SECONDS: 5
      LLAMA_SERVER_URL: 'http://llama-cpp:8000'
      MANAGER_URL: 'http://llama-manager:8000'
      LOG_LEVEL: info
      PORT: 9090
      UPSTREAM_TIMEOUT_SECONDS: 4
    volumes:
      - './llama-cpp/metrics-exporter.js:/app/main.js:ro'
      - './llama-cpp/models.js:/app/models.js:ro'
    expose:
      - 9090
    networks:
      - ai
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:9090/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - llama-manager

  # -- Open WebUI (chat interface) --------------------------------------------
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:v0.8.12
    restart: unless-stopped
    environment:
      DEFAULT_MODELS: 'Qwen3.6-35B-A3B'
      ENABLE_EVALUATION_ARENA_MODELS: false
      ENABLE_MODELS_CACHE: true
      ENABLE_OLLAMA_API: false
      ENABLE_PERSISTENT_CONFIG: true
      ENABLE_WEB_SEARCH: true
      MODELS_CACHE_TTL: 3600
      OPENAI_API_BASE_URL: 'http://llama-manager:8000/v1'
      OPENAI_API_KEY: 'llama-cpp'
      RAG_EMBEDDING_ENGINE: 'openai'
      RAG_EMBEDDING_MODEL: 'Qwen3-Embedding-0.6B'
      RAG_OPENAI_API_BASE_URL: 'http://llama-manager:8000/v1'
      RAG_OPENAI_API_KEY: 'llama-cpp'
      TASK_MODEL: 'Qwen3.5-2B'
      TASK_MODEL_EXTERNAL: 'Qwen3.5-2B'
      WEBUI_AUTH: false
    volumes:
      - 'open-webui-data:/app/backend/data'
    expose:
      - 8080
    networks:
      - ai
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/api/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - llama-manager

  # -- OpenFang ---------------------------------------------------------------
  openfang:
    container_name: openfang
    image: ${OPENFANG_IMAGE}
    restart: unless-stopped
    environment:
      OPENFANG_HOME: ${OPENFANG_HOME}
    env_file:
      - path: './openfang/.env'
        required: false
    cap_add:
      - SYS_ADMIN
    volumes:
      - 'openfang-data:${OPENFANG_HOME}/data'
      - 'openfang-workspaces:${OPENFANG_HOME}/workspaces'
      - './openfang/config.toml:${OPENFANG_HOME}/config.toml.default'
      - './openfang/custom_models.json:${OPENFANG_HOME}/custom_models.json'
    expose:
      - 4200
    networks:
      - ai
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4200/api/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - llama-manager

  # -- AMD GPU metrics exporter -----------------------------------------------
  amd-gpu-exporter:
    container_name: amd-gpu-exporter
    image: rocm/device-metrics-exporter:v1.5.0-beta.0
    restart: unless-stopped
    devices:
      - '/dev/kfd:/dev/kfd'
      - '/dev/dri:/dev/dri'
    group_add:
      - '${VIDEO_GID}'
      - '${RENDER_GID}'
    expose:
      - 5000
    networks:
      - ai

  # -- Host metrics (CPU, RAM, disk, network) ---------------------------------
  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:v1.10.2
    restart: unless-stopped
    pid: host
    volumes:
      - '/proc:/host/proc:ro'
      - '/sys:/host/sys:ro'
      - '/:/rootfs:ro'
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.hwmon'
      - '--collector.thermal_zone'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - 9100
    networks:
      - ai

  # -- Prometheus -------------------------------------------------------------
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.11.2
    restart: unless-stopped
    volumes:
      - 'prometheus-data:/prometheus'
      - './monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    expose:
      - 9090
    networks:
      - ai
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:9090/-/healthy >/dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - node-exporter
      - amd-gpu-exporter
      - llama-metrics-exporter

  # -- Grafana ----------------------------------------------------------------
  grafana:
    container_name: grafana
    image: grafana/grafana-oss:12.4.2
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: true
    volumes:
      - 'grafana-data:/var/lib/grafana'
      - './monitoring/grafana/provisioning:/etc/grafana/provisioning:ro'
      - './monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro'
    expose:
      - 3000
    networks:
      - ai
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - prometheus

  # -- Nginx proxy ------------------------------------------------------------
  proxy:
    container_name: proxy
    image: nginx:1.29.7-trixie
    restart: unless-stopped
    ports:
      - '3000:3000'
      - '4200:4200'
      - '8000:8000'
      - '8080:8080'
      - '9090:9090'
    volumes:
      - 'proxy-logs:/var/log/nginx'
      - './proxy/nginx.conf:/etc/nginx/nginx.conf:ro'
      - './proxy/ssl:/etc/nginx/ssl:ro'
    networks:
      - ai
    depends_on:
      - llama-manager
      - open-webui
      - openfang
      - grafana
      - prometheus
