global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    instance: panther-minor

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Host CPU, RAM, disk, network
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # AMD GPU utilisation, VRAM, temperature, power
  - job_name: amd-gpu
    static_configs:
      - targets: ["amd-gpu-exporter:5000"]

  # llama.cpp server metrics
  - job_name: llama-cpp
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      # Router mode requires ?model=<preset_name> on /metrics.
      - targets: ["llama-cpp:8000"]
        labels:
          scrape_model: panther-minor
      - targets: ["llama-cpp:8000"]
        labels:
          scrape_model: panther-minor-thinking
      - targets: ["llama-cpp:8000"]
        labels:
          scrape_model: panther-blazer
      - targets: ["llama-cpp:8000"]
        labels:
          scrape_model: panther-blazer-thinking
      - targets: ["llama-cpp:8000"]
        labels:
          scrape_model: panther-coder
      - targets: ["llama-cpp:8000"]
        labels:
          scrape_model: panther-coder-next
    relabel_configs:
      - source_labels: [scrape_model]
        target_label: __param_model
      - source_labels: [scrape_model]
        target_label: model
      - action: labeldrop
        regex: scrape_model
