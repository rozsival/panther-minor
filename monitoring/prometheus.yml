global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Host CPU, RAM, disk, network
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # AMD GPU utilisation, VRAM, temperature, power
  - job_name: amd-gpu
    static_configs:
      - targets: ["amd-gpu-exporter:5000"]

  # Ollama metrics
  - job_name: ollama
    static_configs:
      - targets: ["ollama:8000"]
    metrics_path: /metrics
