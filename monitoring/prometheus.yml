global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Host CPU, RAM, disk, network
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # AMD GPU utilisation, VRAM, temperature, power
  - job_name: amd-gpu
    static_configs:
      - targets: ["amd-gpu-exporter:5000"]

  # vLLM inference metrics (requests, latency, KV-cache)
  - job_name: vllm
    static_configs:
      - targets: ["vllm:8000"]
    metrics_path: /metrics
