global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    instance: panther-minor

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Host CPU, RAM, disk, network
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # AMD GPU utilisation, VRAM, temperature, power
  - job_name: amd-gpu
    static_configs:
      - targets: ['amd-gpu-exporter:5000']

  # llama.cpp server metrics
  - job_name: llama-cpp
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      # Router mode is scraped through a sidecar exporter to avoid model load/unload thrashing.
      - targets: ['llama-metrics-exporter:9101']
        labels:
          instance: llama-cpp:8000
