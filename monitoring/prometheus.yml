global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    instance: panther-minor

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Host CPU, RAM, disk, network
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # AMD GPU utilisation, VRAM, temperature, power
  - job_name: amd-gpu
    static_configs:
      - targets: ["amd-gpu-exporter:5000"]
