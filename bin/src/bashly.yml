name: cli
help: '🐆 Panther Minor CLI'
version: 1.0.0

commands:
  - name: setup
    help: Configure the Panther Minor host
    commands:
      - name: all
        help: Run the full workstation setup
        default: force
        flags:
          - long: --server-name
            short: -n
            arg: name
            help: Server name for logs and Git config (defaults to host name)
          - long: --allowed-user
            short: -u
            arg: user
            help: User to configure for host access and tooling (defaults to current user)
          - long: --ssh-port
            short: -p
            arg: port
            help: SSH port to configure (defaults to 2222)
            validate: port
          - long: --timezone
            short: -t
            arg: timezone
            help: System timezone to configure (defaults to Europe/Prague)
          - long: --lvm-device
            short: -d
            arg: path
            help: Logical volume device to extend (defaults to /dev/ubuntu-vg/ubuntu-lv)
        environment_variables:
          - name: panther_server_name
            help: Default server name for setup commands
          - name: panther_allowed_user
            help: Default user for setup commands
          - name: panther_ssh_port
            help: Default SSH port for setup commands
            validate: port
          - name: panther_timezone
            help: Default timezone for setup init
          - name: panther_lvm_device
            help: Default logical volume device for setup init

      - name: init
        help: Extend storage and set timezone
        flags:
          - long: --timezone
            short: -t
            arg: timezone
            help: System timezone to configure (defaults to Europe/Prague)
          - long: --lvm-device
            short: -d
            arg: path
            help: Logical volume device to extend (defaults to /dev/ubuntu-vg/ubuntu-lv)
        environment_variables:
          - name: panther_timezone
            help: Default timezone for setup init
          - name: panther_lvm_device
            help: Default logical volume device for setup init

      - name: packages
        help: Install essential packages

      - name: brew
        help: Install Homebrew, llmfit, and Hugging Face CLI
        flags:
          - long: --allowed-user
            short: -u
            arg: user
            help: User to configure for Homebrew and shell integration
        environment_variables:
          - name: panther_allowed_user
            help: Default user for setup commands

      - name: docker
        help: Install Docker and add the selected user to the docker group
        flags:
          - long: --allowed-user
            short: -u
            arg: user
            help: User to add to the docker group
        environment_variables:
          - name: panther_allowed_user
            help: Default user for setup commands

      - name: tailscale
        help: Install Tailscale

      - name: ssh
        help: Harden SSH configuration
        flags:
          - long: --allowed-user
            short: -u
            arg: user
            help: User to allow in SSH
          - long: --ssh-port
            short: -p
            arg: port
            help: SSH port to configure (defaults to 2222)
            validate: port
        environment_variables:
          - name: panther_allowed_user
            help: Default user for setup commands
          - name: panther_ssh_port
            help: Default SSH port for setup commands
            validate: port

      - name: ufw
        help: Configure the firewall
        flags:
          - long: --ssh-port
            short: -p
            arg: port
            help: SSH port to allow through UFW (defaults to 2222)
            validate: port
        environment_variables:
          - name: panther_ssh_port
            help: Default SSH port for setup commands
            validate: port

      - name: fail2ban
        help: Install and configure fail2ban
        flags:
          - long: --ssh-port
            short: -p
            arg: port
            help: SSH port to protect (defaults to 2222)
            validate: port
        environment_variables:
          - name: panther_ssh_port
            help: Default SSH port for setup commands
            validate: port

      - name: amdgpu
        help: Install AMD GPU drivers and ROCm
      - name: grub
        help: Update GRUB kernel parameters

      - name: git
        help: Configure Git defaults for the selected user
        flags:
          - long: --server-name
            short: -n
            arg: name
            help: Server name for Git identity (defaults to host name)
          - long: --allowed-user
            short: -u
            arg: user
            help: User to configure for Git
        environment_variables:
          - name: panther_server_name
            help: Default server name for setup commands
          - name: panther_allowed_user
            help: Default user for setup commands

      - name: shell
        help: Install Starship and configure shell access for the selected user
        flags:
          - long: --allowed-user
            short: -u
            arg: user
            help: User to configure for shell integration
        environment_variables:
          - name: panther_allowed_user
            help: Default user for setup commands

      - name: env
        help: Create .env and sync GPU group IDs
        flags:
          - long: --allowed-user
            short: -u
            arg: user
            help: User that should own the generated .env file
        environment_variables:
          - name: panther_allowed_user
            help: Default user for setup commands

  - name: models
    help: Manage Panther Minor model files
    commands:
      - name: download
        help: Download a supported model into the local Hugging Face cache
        args:
          - name: model
            required: true
            help: Model name from models/config.json
            validate: supported_model
        environment_variables:
          - name: hf_token
            help: Hugging Face token used by hf download
        examples:
          - cli models download Qwen3.5-35B-A3B
          - HF_TOKEN=token cli models download Qwen3.5-35B-A3B
        completions:
          - $(cd "$(git rev-parse --show-toplevel)" && echo "$(jq -r '.models.[] | .name' models/config.json)")

      - name: list
        help: List supported models

      - name: remove
        help: Remove a downloaded model from the local Hugging Face cache
        args:
          - name: model
            required: true
            help: Model name from models/config.json
            validate: supported_model
        completions:
          - $(cd "$(git rev-parse --show-toplevel)" && echo "$(jq -r '.models.[] | .name' models/config.json)")

      - name: load
        help: Load a model into the llama.cpp server
        args:
          - name: model
            required: true
            help: Model name from models/config.json
            validate: supported_model
        examples:
          - cli models load Qwen3.5-35B-A3B
        completions:
          - $(cd "$(git rev-parse --show-toplevel)" && echo "$(jq -r '.models.[] | .name' models/config.json)")

      - name: unload
        help: Unload a model from the llama.cpp server
        args:
          - name: model
            required: true
            help: Model name from models/config.json
            validate: supported_model
        examples:
          - cli models unload Qwen3.5-35B-A3B
        completions:
          - $(cd "$(git rev-parse --show-toplevel)" && echo "$(jq -r '.models.[] | .name' models/config.json)")

  - name: proxy
    help: Manage proxy SSL and certificate automation
    commands:
      - name: certbot
        help: Issue and install the proxy certificate with acme-dns
        flags:
          - long: --domain
            short: -d
            arg: domain
            help: Domain name to issue the certificate for
            required: true
          - long: --challenge-record
            short: -c
            arg: record
            help: ACME challenge CNAME record to create
            required: true
          - long: --force
            short: -f
            help: Re-register acme-dns credentials even if they already exist

      - name: renew-ssl
        help: Renew existing proxy certificates and reload nginx
      - name: setup-cron
        help: Install a cron entry that renews proxy certificates daily
        flags:
          - long: --schedule
            short: -s
            arg: cron
            help: Cron schedule to install (defaults to 0 2 * * *)
          - long: --user
            short: -u
            arg: user
            help: User whose crontab should receive the renewal entry (defaults to current user)
          - long: --log-path
            short: -l
            arg: path
            help: File to append renewal logs to (defaults to proxy/renew-ssl.log)

  - name: cluster
    help: Manage the Panther Minor Docker Compose cluster
    commands:
      - name: start
        help: Start the cluster
        args:
          - name: service
            required: false
            help: Start only specific service(s); repeat the flag to pass multiple services
            validate: cluster_service
            repeatable: true
        completions:
          - $(cd "$(git rev-parse --show-toplevel)" && echo "$(docker compose config | yq '.services | keys[]')")
        flags:
          - long: --remove-orphans
            short: -r
            help: Remove containers for services not defined in the current configuration

      - name: status
        help: Show the status of cluster containers

      - name: stop
        help: Stop the cluster
        args:
          - name: service
            required: false
            help: Stop only specific service(s); repeat the argument to pass multiple services
            validate: cluster_service
            repeatable: true
        completions:
          - $(cd "$(git rev-parse --show-toplevel)" && echo "$(docker compose config | yq '.services | keys[]')")
        flags:
          - long: --volumes
            short: -v
            help: Remove named volumes when stopping the cluster

      - name: cleanup
        help: Remove cluster containers, volumes, images, and orphans

      - name: restart
        help: Restart the cluster
        args:
          - name: service
            required: false
            help: Restart only specific service(s); repeat the argument to pass multiple services
            validate: cluster_service
            repeatable: true
        completions:
          - $(cd "$(git rev-parse --show-toplevel)" && echo "$(docker compose config | yq '.services | keys[]')")
        flags:
          - long: --remove-orphans
            short: -r
            help: Remove containers for services not defined in the current configuration
          - long: --volumes
            short: -v
            help: Remove named volumes when restarting the cluster

      - name: build
        help: Build cluster images
        args:
          - name: service
            required: false
            help: Build only specific service(s); repeat the argument to pass multiple services
            validate: cluster_service
            repeatable: true
        completions:
          - $(cd "$(git rev-parse --show-toplevel)" && echo "$(docker compose config | yq '.services | keys[]')")
        flags:
          - long: --no-cache
            short: -n
            help: Build images without using the Docker cache

  - name: logs
    help: Stream logs by default or show a one-time tail for cluster services
    args:
      - name: service
        required: true
        help: Service to show logs for
        validate: cluster_service
        repeatable: false
    completions:
      - $(cd "$(git rev-parse --show-toplevel)" && echo "$(docker compose config | yq '.services | keys[]')")
    flags:
      - long: --tail
        short: -t
        arg: lines
        help: Show a one-time tail snapshot for the number of lines specified instead of streaming logs
        validate: integer

  - name: update
    help: Update the repository from upstream

  - name: completions
    help: Print the bash completion script for eval
