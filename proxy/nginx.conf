# -- Nginx proxy with SSL -----------------------------------------------------
events {
	worker_connections 1024;
}

http {
	# SSL configuration
	ssl_certificate /etc/nginx/ssl/fullchain.pem;
	ssl_certificate_key /etc/nginx/ssl/privkey.pem;
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers HIGH:!aNULL:!MD5;

	# Llama.cpp API
	server {
		listen 8000 ssl;
		server_name _;
		error_page 497 =308 https://$host:8000$request_uri;

		location / {
			proxy_pass http://llama-cpp:8000;

			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;

			proxy_set_header Connection '';
			proxy_http_version 1.1;
			chunked_transfer_encoding off;
			proxy_buffering off;
			proxy_cache off;
		}
	}

	# Open-WebUI
	server {
		listen 8080 ssl;
		server_name _;
		error_page 497 =308 https://$host:8080$request_uri;

		location / {
			proxy_pass http://open-webui:8080;

			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;

			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
		}
	}

	# OpenFang
	server {
		listen 4200 ssl;
		server_name _;
		error_page 497 =308 https://$host:4200$request_uri;

		location / {
			proxy_pass http://openfang:4200;

			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;

			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
		}
	}

	# Grafana
	server {
		listen 3000 ssl;
		server_name _;
		error_page 497 =308 https://$host:3000$request_uri;

		location / {
			proxy_pass http://grafana:3000;

			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;

			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
		}
	}

	# Prometheus
	server {
		listen 9090 ssl;
		server_name _;
		error_page 497 =308 https://$host:9090$request_uri;

		location / {
			proxy_pass http://prometheus:9090;

			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;

			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
		}
	}
}
